name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install "fastmcp>=3.2,<4" "pydantic>=2.6,<3" rank-bm25 "pytest>=8" "pytest-asyncio>=0.23" httpx
          pip install -e . --no-deps
        env:
          FHIR_MCP_RAG_DISABLE_CHROMA: "1"
      - name: Seed DB
        run: python scripts/seed_db.py
        env:
          FHIR_MCP_DB: data/fhir.db
      - name: pytest
        run: pytest -q --tb=short
        env:
          FHIR_MCP_DB: data/fhir.db
          FHIR_MCP_RAG_DISABLE_CHROMA: "1"

  eval:
    name: Eval regression gate
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install "fastmcp>=3.2,<4" "pydantic>=2.6,<3" rank-bm25 "pytest>=8" "pytest-asyncio>=0.23"
          pip install -e . --no-deps
        env:
          FHIR_MCP_RAG_DISABLE_CHROMA: "1"
      - name: Seed DB
        run: python scripts/seed_db.py
        env:
          FHIR_MCP_DB: data/fhir.db
      - name: Eval smoke suite
        run: python scripts/run_evals.py --suite smoke --output eval_report.json
        env:
          FHIR_MCP_DB: data/fhir.db
          FHIR_MCP_RAG_DISABLE_CHROMA: "1"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: eval_report.json

  evidence-evals:
    name: Evidence pipeline — tests + eval runner
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install "pydantic>=2.6,<3" rank-bm25 "pytest>=8" "pytest-asyncio>=0.23"
      - name: pytest — evidence_pipeline (115 tests)
        run: PYTHONPATH=$GITHUB_WORKSPACE pytest evidence_pipeline/tests/ -q --tb=short
      - name: FACTS grounding — crosswalk baseline
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE python -c "
          from evidence_pipeline.evals.grounding import ground_crosswalk
          report = ground_crosswalk()
          assert report.fully_grounded, f'Grounding violations: {report.violations}'
          print(f'Grounding: {report.grounding_score:.3f}')
          "
      - name: AMIE 5-axis eval — CI gate >= 0.80
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE python -c "
          from evidence_pipeline.evals.product import run_product_eval, CI_THRESHOLD
          report = run_product_eval()
          assert report.composite >= CI_THRESHOLD, f'AMIE {report.composite:.3f} < {CI_THRESHOLD}'
          print(f'AMIE composite: {report.composite:.3f}')
          "

  evidence-pipeline-integration:
    name: Evidence pipeline — MIMIC-IV + CDM eval
    runs-on: ubuntu-latest
    needs: evidence-evals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install "pydantic>=2.6,<3" rank-bm25 "pytest>=8" "pytest-asyncio>=0.23"
      - name: MIMIC-IV end-to-end pipeline
        run: PYTHONPATH=$GITHUB_WORKSPACE python evidence_pipeline/demo_mimic.py
      - name: Governance CDM eval (composite >= 0.75)
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE python -c "
          from evals.mimic_cdm_eval import run_governance_cdm_eval
          report = run_governance_cdm_eval(use_mock=True)
          report.print_summary()
          assert report.passed, f'CDM {report.mean_composite:.3f} < {report.ci_threshold}'
          "
